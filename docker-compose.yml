version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartspend-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartspend
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smartspend-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartspend?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: SmartSpend2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: smartspend-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
