# Server
server.port=${PORT:8081}

# Database - uses H2 in-memory by default, MySQL if env vars provided
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartspend;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT
jwt.secret=${JWT_SECRET:SmartSpend2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Logging
logging.level.com.smartspend=INFO
logging.level.org.springframework.security=WARN
