# Server
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smartspend?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=SmartSpend2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.smartspend=INFO
logging.level.org.springframework.security=WARN
